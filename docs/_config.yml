remote_theme: giellalt/jekyll-theme-giellalt@main
title: Dictionary for Livvi Karelian ⇒ Russian
description: An electronic dictionary from Livvi Karelian to Russian
plugins:
  - jekyll-remote-theme
  - jekyll-seo-tag
  - jekyll-github-metadata
  - jekyll-include-cache
  - jemoji

defaults:
  - scope: { path: "" }
    values:
      layout: minimal
